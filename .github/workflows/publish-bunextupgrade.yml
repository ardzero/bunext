name: Publish bunextupgrade

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "packages/bunextupgrade/**"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Publish bunextupgrade
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Upgrade npm to latest
        run: npm install -g npm@latest

      - name: Install bunextupgrade dependencies
        working-directory: packages/bunextupgrade
        run: bun install

      - name: Check version
        id: version_check
        working-directory: packages/bunextupgrade
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "name=$PKG_NAME" >> $GITHUB_OUTPUT
          echo "version=$PKG_VERSION" >> $GITHUB_OUTPUT

          PUBLISHED=$(npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$PKG_VERSION" ]; then
            echo "already_published=true" >> $GITHUB_OUTPUT
          else
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish bunextupgrade
        if: steps.version_check.outputs.already_published == 'false'
        working-directory: packages/bunextupgrade
        run: npm publish --provenance --access public
