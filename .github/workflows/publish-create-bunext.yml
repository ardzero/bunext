name: Publish create-bunext to npm

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "packages/create-bunext/**"

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: packages/create-bunext
        run: bun install

      - name: Check if version is already published
        id: version_check
        working-directory: packages/create-bunext
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "name=$PKG_NAME" >> $GITHUB_OUTPUT
          echo "version=$PKG_VERSION" >> $GITHUB_OUTPUT

          PUBLISHED=$(npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$PKG_VERSION" ]; then
            echo "already_published=true" >> $GITHUB_OUTPUT
          else
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip if already published
        if: steps.version_check.outputs.already_published == 'true'
        run: echo "Version ${{ steps.version_check.outputs.version }} already on npm. Skipping."

      - name: Debug OIDC token
        if: steps.version_check.outputs.already_published == 'false'
        run: |
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm" | jq -r '.value')
          echo "$TOKEN" | cut -d. -f2 | base64 -d 2>/dev/null | jq .

      - name: Publish to npm
        if: steps.version_check.outputs.already_published == 'false'
        working-directory: packages/create-bunext
        run: |
          npm config set registry https://registry.npmjs.org/
          npm publish --provenance --access public
        env:
          ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
          ACTIONS_ID_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}
