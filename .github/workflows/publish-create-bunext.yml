name: Publish npm packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "packages/create-bunext/**"
      - "packages/bunext-wrapper/**"

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Upgrade npm to latest
        run: npm install -g npm@latest

      - name: Install create-bunext dependencies
        working-directory: packages/create-bunext
        run: bun install

      - name: Check if create-bunext version is already published
        id: version_check
        working-directory: packages/create-bunext
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "name=$PKG_NAME" >> $GITHUB_OUTPUT
          echo "version=$PKG_VERSION" >> $GITHUB_OUTPUT

          PUBLISHED=$(npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$PKG_VERSION" ]; then
            echo "already_published=true" >> $GITHUB_OUTPUT
          else
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip if already published
        if: steps.version_check.outputs.already_published == 'true'
        run: echo "Version ${{ steps.version_check.outputs.version }} already on npm. Skipping."

      - name: Publish create-bunext
        if: steps.version_check.outputs.already_published == 'false'
        working-directory: packages/create-bunext
        run: npm publish --provenance --access public

      - name: Sync and publish @ardly/bunext wrapper
        if: steps.version_check.outputs.already_published == 'false'
        working-directory: packages/bunext-wrapper
        run: |
          CREATE_BUNEXT_VERSION="${{ steps.version_check.outputs.version }}"
          WRAPPER_VERSION=$(node -p "require('./package.json').version")

          CB_MAJOR=$(echo $CREATE_BUNEXT_VERSION | cut -d. -f1)
          CB_MINOR=$(echo $CREATE_BUNEXT_VERSION | cut -d. -f2)
          CB_PATCH=$(echo $CREATE_BUNEXT_VERSION | cut -d. -f3)

          WRAPPER_MAJOR=$((CB_MAJOR + 1))
          NEW_WRAPPER_VERSION="$WRAPPER_MAJOR.$CB_MINOR.$CB_PATCH"

          echo "Bumping wrapper from $WRAPPER_VERSION to $NEW_WRAPPER_VERSION"

          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$NEW_WRAPPER_VERSION';
            pkg.dependencies['create-bunext'] = '^$CREATE_BUNEXT_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, '\t') + '\n');
          "

          echo "Waiting for create-bunext@$CREATE_BUNEXT_VERSION to propagate on npm..."
          for i in {1..12}; do
            FOUND=$(npm view "create-bunext@$CREATE_BUNEXT_VERSION" version 2>/dev/null || echo "")
            if [ "$FOUND" = "$CREATE_BUNEXT_VERSION" ]; then
              echo "Found on registry!"
              break
            fi
            echo "Not yet available, retrying in 10s... ($i/12)"
            sleep 10
          done

          bun install
          npm publish --provenance --access public

      - name: Commit updated wrapper package.json
        if: steps.version_check.outputs.already_published == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/bunext-wrapper/package.json
          git commit -m "chore: sync @ardly/bunext to create-bunext@${{ steps.version_check.outputs.version }}"
          git push
